
name: ARM, RISC-V & MinGW

on:
  workflow_dispatch

jobs:

  cross-build-run:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/hello-world
    strategy:
      matrix:
        target: [arm, riscv, mingw]
    steps:

# Toolchain + git

      - uses: actions/checkout@v4

      - name: Update
        run: sudo apt update
      - name: Install build tools cross
        run: sudo apt install gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf gcc-riscv64-linux-gnu g++-riscv64-linux-gnu mingw-w64
      - name: Setup mingw
        run: sudo update-alternatives --set x86_64-w64-mingw32-g++ /usr/bin/x86_64-w64-mingw32-g++-posix
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install build tools
        run: python -m pip install meson ninja

      - name: Initialize git submodules
        run: git submodule update --init --recursive

# Build

      - name: Setup build directory meson ${{ matrix.target }
        run: meson setup --cross-file ../cross/meson-cross-${{ matrix.target }}.txt build-meson-${{ matrix.target }}
      - name: Build application meson ${{ matrix.target }}
        run: ninja -C build-meson-${{ matrix.target }}

