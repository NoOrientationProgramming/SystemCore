
name: FreeBSD

on:
  workflow_dispatch

jobs:

  freebsd-native-build-run:
    runs-on: ubuntu-latest
    steps:

      - name: Build in FreeBSD
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          prepare: |
            pkg install -y python git meson ninja
          run: |
            git clone https://github.com/NoOrientationProgramming/SystemCore.git --recursive
            cd SystemCore/tools/hello-world
            meson setup build-meson-native
            ninja -C build-meson-native
            ./build-meson-native/introducing
            cmake -S . -B build-cmake-native
            cmake --build build-cmake/ -j
            ./build-cmake-native/introducing

